<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>{{ post.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* This makes the AI's HTML look nice */
        .prose h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 1rem; color: #2563eb; }
        .prose h2 { font-size: 1.8rem; font-weight: 700; margin-top: 2rem; margin-bottom: 1rem; }
        .prose p { margin-bottom: 1.5rem; line-height: 1.7; font-size: 1.1rem; }
        .prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div class="max-w-3xl mx-auto px-4 py-12">
        <a href="/" class="text-blue-500 font-bold mb-8 inline-block">&larr; ← Back to Directory</a>
        
        <div class="bg-white p-8 md:p-12 rounded-2xl shadow-sm border prose">
            {{ post.content | safe }} 
        </div>
    </div>
</body>
</html>
