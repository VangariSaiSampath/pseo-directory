<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3460388852758392"
     crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M7SNZL2J29"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-M7SNZL2J29');
    </script>
    <meta charset="UTF-8">
    <title>{{ tool_a }} vs {{ tool_b }} Comparison</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 py-12">
    <div class="max-w-4xl mx-auto px-4">
        <h1 class="text-4xl font-black text-center mb-12">{{ tool_a }} vs {{ tool_b }}: Which is better?</h1>
        
        <div class="grid grid-cols-2 gap-8 text-center">
            <div class="bg-white p-8 rounded-xl shadow-sm border">
                <h2 class="text-2xl font-bold mb-4">{{ tool_a }}</h2>
                <p class="text-gray-600 text-sm md:text-base">{{ tool_a_text }}</p>
            </div>
            <div class="bg-white p-8 rounded-xl shadow-sm border">
                <h2 class="text-2xl font-bold mb-4">{{ tool_b }}</h2>
                <p class="text-gray-600 text-sm md:text-base">{{ tool_b_text }}</p>
            </div>
        </div>
        
        <div class="mt-12 bg-white p-8 rounded-xl border text-center">
            <h3 class="text-xl font-bold mb-4">🏆 Final Verdict</h3>
            <p class="text-gray-700 text-base md:text-lg font-medium leading-relaxed">
                {{ verdict }}
            </p>
            <a href="javascript:history.back()" class="inline-block mt-6 text-blue-600 font-bold hover:underline">Back to Directory</a>
        </div>
    </div>
</body>
</html>
